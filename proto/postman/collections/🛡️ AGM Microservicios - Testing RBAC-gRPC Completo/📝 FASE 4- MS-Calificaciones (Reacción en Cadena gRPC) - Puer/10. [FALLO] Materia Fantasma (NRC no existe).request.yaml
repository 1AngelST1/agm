$kind: http-request
description: |-
  ❌ Integración gRPC: MS-Calificaciones pregunta a MS-Periodos

  **Esperado:** 404 Not Found

  **Logs esperados:**
  - Terminal ms-calificaciones: Intenta validar NRC 99999 via gRPC
  - Terminal ms-periodos: Responde que no existe
  - Respuesta: 404 Not Found
url: http://localhost:3003/calificaciones/calificar
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{TOKEN_ADMIN}}
body:
  type: text
  content: |-
    {
      "nrc_grupo": "99999",
      "matricula_alumno": "202253882",
      "calificacion_ordinaria": 9.5
    }
order: 1000
