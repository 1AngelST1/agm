$kind: http-request
description: |-
  ✅ ÉXITO TOTAL - Reacción en cadena de 5 microservicios

  **Esperado:** 201 Created

  **Reacción en cadena que verás:**

  1. **Postman:** 201 Created
  2. **Terminal ms-calificaciones:** 
     - Valida token via gRPC con ms-auth
     - Valida NRC 50130 via gRPC con ms-periodos
     - Valida matrícula 202253882 via gRPC con ms-alumnos
     - Guarda calificación en BD
  3. **Terminal ms-periodos:** Responde que NRC existe
  4. **Terminal ms-alumnos:** Responde que alumno existe
  5. **Terminal ms-notificaciones:** Envía correo a angel.sarmientot@alumno.buap.mx notificando actualización de calificación

  **ESTO CONFIRMA QUE LOS 5 MS FUNCIONAN JUNTOS PERFECTAMENTE**
url: http://localhost:3003/calificaciones/calificar
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{TOKEN_ADMIN}}
body:
  type: text
  content: |-
    {
      "nrc_grupo": "50130",
      "matricula_alumno": "202253882",
      "calificacion_ordinaria": 9.5
    }
order: 3000
