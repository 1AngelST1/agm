syntax = "proto3";

package calificaciones;

service CalificacionesService {
  rpc GetCalificacionesByMatricula(GetCalificacionesRequest) returns (CalificacionesResponse);
  rpc CreateCalificacion(CreateCalificacionRequest) returns (CalificacionResponse);
  rpc GetConcentrado(ConcentradoRequest) returns (ConcentradoResponse);
  rpc GetPromedioAlumno(GetPromedioAlumnoRequest) returns (GetPromedioAlumnoResponse);
  rpc GetEstadisticasMateria(GetEstadisticasMateriaRequest) returns (GetEstadisticasMateriaResponse);
}

message GetCalificacionesRequest {
  string matricula = 1;
}

message CalificacionesResponse {
  repeated CalificacionResponse calificaciones = 1;
}

message CreateCalificacionRequest {
  string nrc_grupo = 1;
  string matricula_alumno = 2;
  float calificacion_ordinaria = 3;
  string estatus = 4;
}

message CalificacionResponse {
  string id = 1;
  string nrc_grupo = 2;
  string matricula_alumno = 3;
  float calificacion_ordinaria = 4;
  string estatus = 5;
}

message Materia {
  string clave = 1;
  string nombre = 2;
  float creditos = 3;
}

message Grupo {
  string nrc = 1;
  Materia materia = 2;
  string docente_id = 3;
  string seccion = 4;
  string periodo = 5;
}

// ===============================================
// 🔥 MENSAJES NUEVOS PARA EL REPORTE DE CONCENTRADO
// ===============================================

message ConcentradoRequest {
  string nrc = 1;
}

message MateriaInfo {
  string clave = 1;
  string nombre = 2;
}

message PonderacionInfo {
  double examen = 1;
  double tarea = 2;
  double proyecto = 3;
}

message AlumnoNota {
  string matricula = 1;
  string nombre_estudiante = 2;
  double calificacion_examen = 3;
  double calificacion_tarea = 4;
  double calificacion_proyecto = 5;
  double promedio_ponderado = 6;
  string estatus = 7;
}

message ConcentradoResponse {
  string nrc_grupo = 1;
  MateriaInfo materia = 2;
  string periodo = 3;
  int32 total_estudiantes = 4;
  repeated AlumnoNota calificaciones = 5; 
  PonderacionInfo ponderaciones = 6;
}

// ===============================================
// NUEVOS MENSAJES PARA GetPromedioAlumno
// ===============================================

message GetPromedioAlumnoRequest {
  string matricula = 1;
}

message GetPromedioAlumnoResponse {
  string matricula = 1;
  string nombre_estudiante = 2;
  double promedio_general = 3;
  int32 total_materias = 4;
  int32 materias_aprobadas = 5;
  int32 materias_reprobadas = 6;
  repeated MateriaCalificacion materias = 7;
}

message MateriaCalificacion {
  string nrc = 1;
  string materia_nombre = 2;
  double calificacion_final = 3;
  string estatus = 4;
}

// ===============================================
// NUEVOS MENSAJES PARA GetEstadisticasMateria
// ===============================================

message GetEstadisticasMateriaRequest {
  string nrc = 1;
}

message GetEstadisticasMateriaResponse {
  string nrc = 1;
  string materia_nombre = 2;
  string clave_materia = 3;
  int32 total_estudiantes = 4;
  int32 estudiantes_aprobados = 5;
  int32 estudiantes_reprobados = 6;
  double promedio_grupo = 7;
  double calificacion_maxima = 8;
  double calificacion_minima = 9;
  double desviacion_estandar = 10;
}