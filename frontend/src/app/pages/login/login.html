<div class="login-container">
  <h2>🔐 Iniciar Sesión</h2>
  
  <input 
    type="email" 
    [(ngModel)]="email" 
    placeholder="Tu correo (ej: angel@uni.mx)" 
    class="login-input"
  >
  
  <button (click)="iniciarSesion()" class="login-button">
    Entrar
  </button>

  @if (error()) {
    <p class="error-text">{{ error() }}</p>
  }
</div>
