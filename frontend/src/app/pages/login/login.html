<div class="login-box">
  <h2>🔐 Sistema AGM - Inicio de Sesión</h2>
  
  <div class="input-group">
    <label>Correo Institucional</label>
    <input type="email" [(ngModel)]="email" placeholder="ejemplo@alumno.buap.mx">
  </div>

  <div class="input-group">
    <label>Contraseña</label>
    <input type="password" [(ngModel)]="password" placeholder="••••••••">
  </div>
  
  <button (click)="iniciarSesion()">Entrar al Portal</button>

  @if (error()) {
    <p class="error">{{ error() }}</p>
  }
</div>
