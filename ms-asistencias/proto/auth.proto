syntax = "proto3";

package auth;

// AuthService provides authentication and user profile operations
service AuthService {
  // ValidateToken validates a JWT token and returns user claims
  rpc ValidateToken (ValidateTokenRequest) returns (UserClaims) {}
  // GetUserById retrieves user profile information by ID
  rpc GetUserById (UserByIdRequest) returns (UserProfile) {}
  // CheckRole checks if a user has a specific role
  rpc CheckRole (CheckRoleRequest) returns (CheckRoleResponse) {}
}

message ValidateTokenRequest {
  string token = 1;
}

message UserClaims {
  string user_id = 1;
  string email = 2;
  string role = 3;
}

message UserByIdRequest {
  string user_id = 1;
}

message UserProfile {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string role = 4;
}

message CheckRoleRequest {
  string user_id = 1;
  string role = 2;
}

message CheckRoleResponse {
  bool is_authorized = 1;
}